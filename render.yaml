services:
  - type: web
    name: echelon-vantage
    runtime: python
    repo: https://github.com/secondminddev-max/space-osint
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NASA_API_KEY
        value: DEMO_KEY
      - key: PYTHON_VERSION
        value: "3.11.11"
